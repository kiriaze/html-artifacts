<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Examples — html-artifacts</title>
    <style>
      :root {
        --accent: #2563eb;
        --fg: #111827;
        --fg-muted: #6b7280;
        --fg-faint: #9ca3af;
        --bg: #fff;
        --bg-subtle: #f9fafb;
        --bg-subtle-2: #f3f4f6;
        --border: #e5e7eb;
        --border-strong: #d1d5db;
        --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --mono: 'SF Mono', Menlo, monospace;
      }
      html.dark {
        --fg: #e6edf3;
        --fg-muted: #8b949e;
        --fg-faint: #6e7681;
        --bg: #0d1117;
        --bg-subtle: #161b22;
        --bg-subtle-2: #21262d;
        --accent: #58a6ff;
        --border: #30363d;
        --border-strong: #484f58;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        display: flex;
        font-family: var(--font);
        background: var(--bg);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
      }

      /* ── Sidebar ── */
      .sb {
        width: 224px;
        height: 100%;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg-subtle);
        border-right: 1px solid var(--border);
      }
      .sb-top {
        padding: 11px 12px 9px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .wm {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        color: var(--fg);
      }
      .ib {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--fg-faint);
        font-size: 14px;
        padding: 3px 4px;
        border-radius: 3px;
      }
      .ib:hover {
        color: var(--fg);
        background: var(--bg-subtle-2);
      }

      .sb-search {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        position: relative;
      }
      .sb-search svg {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        width: 12px;
        height: 12px;
        color: var(--fg-faint);
        pointer-events: none;
      }
      .sb-search input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: 5px;
        padding: 5px 8px 5px 26px;
        font-size: 12px;
        font-family: var(--font);
        color: var(--fg);
        outline: none;
      }
      .sb-search input:focus {
        border-color: var(--accent);
      }
      .sb-search input::placeholder {
        color: var(--fg-faint);
      }

      /* ── Category chips ── */
      .chips {
        padding: 7px 10px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 5px;
        overflow-x: auto;
        flex-shrink: 0;
      }
      .chips::-webkit-scrollbar {
        display: none;
      }
      .chip {
        background: none;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 3px 8px;
        font-size: 10.5px;
        font-family: var(--font);
        cursor: pointer;
        white-space: nowrap;
        color: var(--fg-muted);
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
        transition:
          background 0.1s,
          border-color 0.1s,
          color 0.1s;
      }
      .chip:hover {
        border-color: var(--fg-muted);
        color: var(--fg);
      }
      .chip.on {
        background: var(--fg);
        border-color: var(--fg);
        color: var(--bg);
      }
      .chip-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
      }
      .chip-n {
        font-size: 9.5px;
        opacity: 0.65;
      }

      /* ── List ── */
      .sb-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }
      .sb-list::-webkit-scrollbar {
        width: 3px;
      }
      .sb-list::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 3px;
      }

      .ex {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 7px 12px;
        cursor: pointer;
        transition: background 0.1s;
      }
      .ex:hover {
        background: var(--bg-subtle-2);
      }
      .ex.on {
        /* tinted by JS via inline style */
      }
      .ex.kbd {
        outline: 1px solid var(--accent);
        outline-offset: -1px;
      }
      .ex-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 5px;
      }
      .ex-info {
        flex: 1;
        min-width: 0;
      }
      .ex-name {
        font-size: 12px;
        font-weight: 500;
        color: var(--fg);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.4;
      }
      .ex.on .ex-name {
        /* colored by JS */
      }
      .ex-desc {
        font-size: 10.5px;
        color: var(--fg-faint);
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .no-res {
        padding: 20px 12px;
        font-size: 11.5px;
        color: var(--fg-faint);
        text-align: center;
      }

      .sb-foot {
        border-top: 1px solid var(--border);
        padding: 7px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .bl {
        font-size: 11px;
        color: var(--fg-faint);
        text-decoration: none;
      }
      .bl:hover {
        color: var(--accent);
      }
      .vl {
        font-size: 11px;
        color: var(--fg-faint);
      }
      .vl a {
        color: var(--fg-faint);
        text-decoration: none;
        padding: 0 3px;
      }
      .vl a:hover {
        color: var(--accent);
      }
      .vl a.cur {
        color: var(--fg);
        font-weight: 700;
        pointer-events: none;
      }

      /* ── Preview ── */
      .pv {
        flex: 1;
        min-width: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .pv-bar {
        height: 38px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        background: var(--bg);
        flex-shrink: 0;
      }
      .pv-cat {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        padding: 2px 8px;
        border-radius: 10px;
      }
      .pv-name {
        font-size: 12px;
        font-weight: 500;
        color: var(--fg);
      }
      .pv-ext {
        margin-left: auto;
        font-size: 11px;
        color: var(--accent);
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 8px;
        white-space: nowrap;
      }
      .pv-ext:hover {
        background: var(--bg-subtle);
        text-decoration: none;
      }
      iframe {
        flex: 1;
        border: none;
        width: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <aside class="sb">
      <div class="sb-top">
        <span class="wm">html-artifacts</span>
        <button class="ib" id="dmt">◐</button>
      </div>
      <div class="sb-search">
        <svg
          viewBox="0 0 14 14"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        >
          <circle cx="5.5" cy="5.5" r="4" />
          <line x1="9" y1="9" x2="13" y2="13" />
        </svg>
        <input type="search" id="q" placeholder="Filter…" autocomplete="off" />
      </div>
      <div class="chips" id="chips"></div>
      <div class="sb-list" id="list"></div>
      <div class="sb-foot">
        <a href="../index.html" class="bl">← Grid view</a>
        <span class="vl">
          <a href="index-browser-a.html">A</a>
          <a href="index-browser-b.html" class="cur">B</a>
          <a href="index-browser-c.html">C</a>
        </span>
      </div>
    </aside>

    <div class="pv">
      <div class="pv-bar">
        <span class="pv-cat" id="pcat"></span>
        <span class="pv-name" id="pname">Research Explainer</span>
        <a
          class="pv-ext"
          id="pext"
          href="../examples/research-explainer.html"
          target="_blank"
          >Open ↗</a
        >
      </div>
      <iframe
        id="fr"
        src="../examples/research-explainer.html"
        title="Preview"
      ></iframe>
    </div>

    <script>
      var D = [
        {
          id: 'planning',
          name: 'Planning',
          c: '#2563eb',
          bg: 'rgba(37,99,235,.07)',
          items: [
            {
              name: 'Product Brief',
              file: 'product-brief.html',
              desc: 'One-page product overview',
            },
            {
              name: 'Comparison Board',
              file: 'comparison-board.html',
              desc: 'Feature matrix',
            },
            {
              name: 'Approach Explorer',
              file: 'approach-explorer.html',
              desc: 'Options comparison',
            },
            {
              name: 'Feature Spec',
              file: 'feature-spec.html',
              desc: 'Detailed feature spec',
            },
            {
              name: 'Milestone Plan',
              file: 'milestone-plan.html',
              desc: 'Product roadmap',
            },
          ],
        },
        {
          id: 'code',
          name: 'Code',
          c: '#7c3aed',
          bg: 'rgba(124,58,237,.07)',
          items: [
            {
              name: 'Code Review',
              file: 'code-review.html',
              desc: 'PR walkthrough',
            },
            {
              name: 'Architecture Diagram',
              file: 'architecture-diagram.html',
              desc: 'System overview',
            },
            {
              name: 'Flowchart Diagram',
              file: 'flowchart-diagram.html',
              desc: 'Process flow',
            },
            {
              name: 'Incident Report',
              file: 'incident-report.html',
              desc: 'Post-mortem',
            },
          ],
        },
        {
          id: 'reporting',
          name: 'Reporting',
          c: '#16a34a',
          bg: 'rgba(22,163,74,.07)',
          items: [
            {
              name: 'Status Report',
              file: 'status-report.html',
              desc: 'Sprint recap',
            },
            {
              name: 'Design Explorer',
              file: 'design-explorer.html',
              desc: 'Design tokens',
            },
            {
              name: 'Visual Designs',
              file: 'exploration-visual-designs.html',
              desc: 'Design variants',
            },
          ],
        },
        {
          id: 'proto',
          name: 'Prototyping',
          c: '#d97706',
          bg: 'rgba(217,119,6,.07)',
          items: [
            {
              name: 'Prototype: Interaction',
              file: 'prototype-interaction.html',
              desc: 'Clickable flow',
            },
            {
              name: 'Prototype: Animation',
              file: 'prototype-animation.html',
              desc: 'Motion explorer',
            },
            {
              name: 'Slide Deck',
              file: 'slide-deck.html',
              desc: 'Presentation',
            },
          ],
        },
        {
          id: 'docs',
          name: 'Docs',
          c: '#db2777',
          bg: 'rgba(219,39,119,.07)',
          items: [
            {
              name: 'Research Explainer',
              file: 'research-explainer.html',
              desc: 'Feature explainer',
            },
            {
              name: 'Editor Board',
              file: 'editor-board.html',
              desc: 'Feature triage',
            },
            {
              name: 'Feature Flags',
              file: 'editor-feature-flags.html',
              desc: 'Flag reference',
            },
          ],
        },
      ]

      var cur = 'research-explainer.html'
      var curCat = null
      var kbdIdx = -1

      var fr = document.getElementById('fr')
      var pname = document.getElementById('pname')
      var pcat = document.getElementById('pcat')
      var pext = document.getElementById('pext')
      var list = document.getElementById('list')
      var chipsEl = document.getElementById('chips')
      var q = document.getElementById('q')

      function catForFile(file) {
        for (var i = 0; i < D.length; i++)
          for (var j = 0; j < D[i].items.length; j++)
            if (D[i].items[j].file === file) return D[i]
        return D[0]
      }

      function load(file, name) {
        cur = file
        fr.src = '../examples/' + file
        var cat = catForFile(file)
        pname.textContent = name
        pcat.textContent = cat.name
        pcat.style.background = cat.bg
        pcat.style.color = cat.c
        pext.href = '../examples/' + file
        document.querySelectorAll('.ex').forEach(function (el) {
          var isOn = el.dataset.f === file
          el.classList.toggle('on', isOn)
          if (isOn) {
            el.style.background = cat.bg
            el.querySelector('.ex-name').style.color = cat.c
          } else {
            el.style.background = ''
            el.querySelector('.ex-name').style.color = ''
          }
        })
        history.replaceState(null, '', '#' + file.replace('.html', ''))
      }

      function makeEx(item, cat) {
        var el = document.createElement('div')
        el.className = 'ex' + (item.file === cur ? ' on' : '')
        el.dataset.f = item.file
        if (item.file === cur) {
          el.style.background = cat.bg
        }
        var dot = document.createElement('span')
        dot.className = 'ex-dot'
        dot.style.background = cat.c
        var info = document.createElement('div')
        info.className = 'ex-info'
        var nm = document.createElement('div')
        nm.className = 'ex-name'
        nm.textContent = item.name
        if (item.file === cur) nm.style.color = cat.c
        var desc = document.createElement('div')
        desc.className = 'ex-desc'
        desc.textContent = item.desc
        info.appendChild(nm)
        info.appendChild(desc)
        el.appendChild(dot)
        el.appendChild(info)
        el.addEventListener('click', function () {
          load(item.file, item.name)
        })
        return el
      }

      function renderList() {
        list.innerHTML = ''
        kbdIdx = -1
        var query = q.value.toLowerCase().trim()
        var n = 0
        D.forEach(function (cat) {
          if (curCat && cat.id !== curCat) return
          cat.items.forEach(function (item) {
            if (
              query &&
              item.name.toLowerCase().indexOf(query) === -1 &&
              item.desc.toLowerCase().indexOf(query) === -1
            )
              return
            list.appendChild(makeEx(item, cat))
            n++
          })
        })
        if (!n) {
          var m = document.createElement('div')
          m.className = 'no-res'
          m.textContent = 'No matches'
          list.appendChild(m)
        }
      }

      function renderChips() {
        chipsEl.innerHTML = ''
        var all = document.createElement('button')
        all.className = 'chip' + (!curCat ? ' on' : '')
        var at = document.createElement('span')
        at.textContent = 'All'
        all.appendChild(at)
        all.addEventListener('click', function () {
          curCat = null
          renderChips()
          renderList()
        })
        chipsEl.appendChild(all)
        D.forEach(function (cat) {
          var ch = document.createElement('button')
          ch.className = 'chip' + (curCat === cat.id ? ' on' : '')
          var dot = document.createElement('span')
          dot.className = 'chip-dot'
          dot.style.background = curCat === cat.id ? 'currentColor' : cat.c
          var tx = document.createElement('span')
          tx.textContent = cat.name
          var n = document.createElement('span')
          n.className = 'chip-n'
          n.textContent = cat.items.length
          ch.appendChild(dot)
          ch.appendChild(tx)
          ch.appendChild(n)
          ch.addEventListener('click', function () {
            curCat = cat.id
            renderChips()
            renderList()
          })
          chipsEl.appendChild(ch)
        })
      }

      function kbdMove(d) {
        var rows = list.querySelectorAll('.ex')
        rows.forEach(function (r) {
          r.classList.remove('kbd')
        })
        kbdIdx = Math.max(0, Math.min(rows.length - 1, kbdIdx + d))
        if (rows[kbdIdx]) {
          rows[kbdIdx].classList.add('kbd')
          rows[kbdIdx].scrollIntoView({ block: 'nearest' })
        }
      }

      document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowDown') {
          e.preventDefault()
          kbdMove(kbdIdx === -1 ? 1 : 1)
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault()
          kbdMove(-1)
        }
        if (e.key === 'Enter' && kbdIdx >= 0) {
          var rows = list.querySelectorAll('.ex')
          if (rows[kbdIdx]) rows[kbdIdx].click()
        }
        if (e.key === 'Escape') {
          q.value = ''
          renderList()
          q.blur()
        }
      })

      renderChips()
      renderList()
      q.addEventListener('input', function () {
        kbdIdx = -1
        renderList()
      })

      // set initial pcat
      var initCat = catForFile(cur)
      pcat.textContent = initCat.name
      pcat.style.background = initCat.bg
      pcat.style.color = initCat.c

      var hash = window.location.hash.slice(1)
      if (hash) {
        var hf = hash + '.html'
        D.forEach(function (c) {
          c.items.forEach(function (i) {
            if (i.file === hf) load(i.file, i.name)
          })
        })
      }

      ;(function () {
        var t =
          localStorage.getItem('ha-theme') ||
          (window.matchMedia('(prefers-color-scheme:dark)').matches
            ? 'dark'
            : 'light')
        if (t === 'dark') document.documentElement.classList.add('dark')
        document.getElementById('dmt').addEventListener('click', function () {
          var d = document.documentElement.classList.toggle('dark')
          localStorage.setItem('ha-theme', d ? 'dark' : 'light')
        })
      })()
    </script>
  </body>
</html>
