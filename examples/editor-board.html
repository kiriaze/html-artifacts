<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Triage — Acme Sync v1.2</title>
  <style>
    :root {
      --bg: #FAF9F5;
      --fg: #141413;
      --accent: #D97757;
      --secondary: #E3DACC;
      --tertiary: #788C5D;
      --g100: #F5F4F0;
      --g300: #D1CFC8;
      --g500: #8A887F;
      --g700: #3D3C38;
      --font-serif: Georgia, 'Times New Roman', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      background: var(--bg);
      border-bottom: 1px solid var(--g300);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      height: 48px;
      flex-shrink: 0;
    }
    .brand { font-weight: 600; font-size: 14px; }
    .brand-version {
      font-size: 12px;
      font-weight: 400;
      color: var(--g500);
      margin-left: 6px;
    }
    .nav-title {
      font-size: 13px;
      color: var(--g500);
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 16px;
    }

    /* ── Board ── */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      flex: 1;
      align-items: start;
    }

    /* ── Column ── */
    .column {
      background: var(--g100);
      border: 1px solid var(--g300);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      min-height: 320px;
    }

    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--g300);
    }
    .col-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .02em;
      color: var(--g700);
    }
    .col-badge {
      background: var(--secondary);
      color: var(--g700);
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      transition: background .15s;
    }

    .card-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    /* drop zone highlight */
    .column.drag-over {
      border-color: var(--accent);
      background: #FDF6F2;
    }
    .column.drag-over .col-badge { background: var(--accent); color: #fff; }

    /* ── Cards ── */
    .card {
      background: #fff;
      border: 1px solid var(--g300);
      border-radius: var(--radius-md);
      padding: 12px 12px 10px;
      cursor: grab;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: box-shadow .1s, border-color .1s, opacity .15s;
      user-select: none;
    }
    .card:hover {
      border-color: var(--g500);
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .card.dragging {
      opacity: .4;
      cursor: grabbing;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .drag-handle {
      color: var(--g300);
      font-size: 14px;
      line-height: 1;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: grab;
    }
    .card:hover .drag-handle { color: var(--g500); }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
      line-height: 1.4;
      flex: 1;
    }

    .priority-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      margin-top: 1px;
    }
    .p1 { background: #FDECEA; color: #C0392B; }
    .p2 { background: #FEF3E2; color: #A0522D; }
    .p3 { background: var(--g100); color: var(--g500); }

    /* ── Footer toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 12px 0 0;
      border-top: 1px solid var(--g300);
    }

    .copy-hint {
      font-size: 12px;
      color: var(--g500);
    }
    .copy-hint.success { color: var(--tertiary); }

    .copy-btn {
      background: var(--fg);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      padding: 8px 16px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .1s;
    }
    .copy-btn:hover { background: var(--g700); }
    .copy-btn:active { transform: scale(.98); }
  </style>
</head>
<body>

<nav>
  <span class="brand">Acme Sync <span class="brand-version">v1.2</span></span>
  <span class="nav-title">Feature Triage Board</span>
</nav>

<main>
  <div class="board" id="board">
    <div class="column" id="col-now" data-col="Now">
      <div class="col-header">
        <span class="col-title">Now</span>
        <span class="col-badge" id="badge-now">0</span>
      </div>
      <div class="card-list" id="list-now"></div>
    </div>

    <div class="column" id="col-next" data-col="Next">
      <div class="col-header">
        <span class="col-title">Next</span>
        <span class="col-badge" id="badge-next">0</span>
      </div>
      <div class="card-list" id="list-next"></div>
    </div>

    <div class="column" id="col-later" data-col="Later">
      <div class="col-header">
        <span class="col-title">Later</span>
        <span class="col-badge" id="badge-later">0</span>
      </div>
      <div class="card-list" id="list-later"></div>
    </div>
  </div>

  <div class="toolbar">
    <span class="copy-hint" id="copy-hint"></span>
    <button class="copy-btn" id="copy-btn">Copy as Markdown</button>
  </div>
</main>

<script>
  // ── Data ──────────────────────────────────────────────────────────────────
  var INITIAL_CARDS = [
    { id: 'c1', title: 'Binary file conflict UI', priority: 'P1', col: 'now' },
    { id: 'c2', title: 'Windows installer',        priority: 'P1', col: 'now' },
    { id: 'c3', title: 'Team namespaces',          priority: 'P2', col: 'next' },
    { id: 'c4', title: 'Web dashboard (read-only)', priority: 'P2', col: 'next' },
    { id: 'c5', title: 'Webhook on sync complete', priority: 'P3', col: 'next' },
    { id: 'c6', title: 'Mobile app',               priority: 'P3', col: 'later' },
    { id: 'c7', title: 'Plugin API',               priority: 'P3', col: 'later' },
    { id: 'c8', title: 'Conflict auto-resolver (ML)', priority: 'P3', col: 'later' }
  ];

  // ── State ─────────────────────────────────────────────────────────────────
  var draggingId = null;
  var draggingOverCol = null;

  // ── Helpers ───────────────────────────────────────────────────────────────
  function priorityClass(p) {
    if (p === 'P1') return 'p1';
    if (p === 'P2') return 'p2';
    return 'p3';
  }

  function getCardData(cardEl) {
    return {
      id:       cardEl.dataset.id,
      title:    cardEl.dataset.title,
      priority: cardEl.dataset.priority,
      col:      cardEl.closest('.column').dataset.col
    };
  }

  function updateBadges() {
    ['now', 'next', 'later'].forEach(function(col) {
      var list = document.getElementById('list-' + col);
      var badge = document.getElementById('badge-' + col);
      badge.textContent = list.querySelectorAll('.card').length;
    });
  }

  // ── Build card element ────────────────────────────────────────────────────
  function createCardEl(card) {
    var el = document.createElement('div');
    el.className = 'card';
    el.setAttribute('draggable', 'true');
    el.dataset.id = card.id;
    el.dataset.title = card.title;
    el.dataset.priority = card.priority;

    var top = document.createElement('div');
    top.className = 'card-top';

    var handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.setAttribute('aria-hidden', 'true');
    handle.textContent = '⠿';

    var title = document.createElement('span');
    title.className = 'card-title';
    title.textContent = card.title;

    var badge = document.createElement('span');
    badge.className = 'priority-badge ' + priorityClass(card.priority);
    badge.textContent = card.priority;

    top.appendChild(handle);
    top.appendChild(title);
    top.appendChild(badge);
    el.appendChild(top);

    // Drag events
    el.addEventListener('dragstart', function(e) {
      draggingId = card.id;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.id);
      setTimeout(function() { el.classList.add('dragging'); }, 0);
    });

    el.addEventListener('dragend', function() {
      el.classList.remove('dragging');
      draggingId = null;
      // Remove all drag-over highlights
      document.querySelectorAll('.column').forEach(function(col) {
        col.classList.remove('drag-over');
      });
      updateBadges();
    });

    return el;
  }

  // ── Render initial cards ──────────────────────────────────────────────────
  INITIAL_CARDS.forEach(function(card) {
    var list = document.getElementById('list-' + card.col);
    if (list) list.appendChild(createCardEl(card));
  });

  updateBadges();

  // ── Column drop targets ───────────────────────────────────────────────────
  document.querySelectorAll('.column').forEach(function(colEl) {
    colEl.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      colEl.classList.add('drag-over');
    });

    colEl.addEventListener('dragleave', function(e) {
      // Only remove if leaving the column entirely
      if (!colEl.contains(e.relatedTarget)) {
        colEl.classList.remove('drag-over');
      }
    });

    colEl.addEventListener('drop', function(e) {
      e.preventDefault();
      colEl.classList.remove('drag-over');

      var id = e.dataTransfer.getData('text/plain');
      if (!id) return;

      var cardEl = document.querySelector('.card[data-id="' + id + '"]');
      if (!cardEl) return;

      var targetList = colEl.querySelector('.card-list');
      if (!targetList) return;

      // Insert before the card being hovered, if any
      var afterCard = getCardAfterDrop(targetList, e.clientY);
      if (afterCard) {
        targetList.insertBefore(cardEl, afterCard);
      } else {
        targetList.appendChild(cardEl);
      }

      updateBadges();
    });
  });

  function getCardAfterDrop(list, y) {
    var cards = Array.from(list.querySelectorAll('.card:not(.dragging)'));
    var result = null;
    cards.forEach(function(card) {
      var rect = card.getBoundingClientRect();
      var mid = rect.top + rect.height / 2;
      if (y < mid && result === null) result = card;
    });
    return result;
  }

  // ── Copy as Markdown ──────────────────────────────────────────────────────
  var copyBtn = document.getElementById('copy-btn');
  var copyHint = document.getElementById('copy-hint');
  var hintTimer = null;

  copyBtn.addEventListener('click', function() {
    var cols = [
      { id: 'list-now',   label: 'Now' },
      { id: 'list-next',  label: 'Next' },
      { id: 'list-later', label: 'Later' }
    ];

    var colCards = cols.map(function(col) {
      var list = document.getElementById(col.id);
      var cards = list.querySelectorAll('.card');
      var titles = [];
      cards.forEach(function(c) { titles.push(c.dataset.title); });
      return titles;
    });

    // Find longest column for row count
    var maxLen = 0;
    colCards.forEach(function(col) { if (col.length > maxLen) maxLen = col.length; });

    var header = '| Now | Next | Later |';
    var sep    = '|---|---|---|';
    var rows = [];

    for (var i = 0; i < maxLen; i++) {
      var row = '| ';
      row += (colCards[0][i] || '') + ' | ';
      row += (colCards[1][i] || '') + ' | ';
      row += (colCards[2][i] || '') + ' |';
      rows.push(row);
    }

    var md = [header, sep].concat(rows).join('\n');

    navigator.clipboard.writeText(md).then(function() {
      copyHint.textContent = 'Copied to clipboard';
      copyHint.classList.add('success');
      if (hintTimer) clearTimeout(hintTimer);
      hintTimer = setTimeout(function() {
        copyHint.textContent = '';
        copyHint.classList.remove('success');
      }, 2500);
    }).catch(function() {
      copyHint.textContent = 'Copy failed — check clipboard permissions';
      copyHint.classList.remove('success');
    });
  });
</script>
</body>
</html>
